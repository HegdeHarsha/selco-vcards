<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELCO VCard System</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/easy-qrcodejs/4.4.13/easy.qrcode.min.js"></script>
</head>
<body>

    <div id="app-container">
        <!-- This view is shown if a specific employee ID is in the URL -->
        <div id="vcard-view" class="view">
            <!-- Employee vCard will be injected here by JavaScript -->
        </div>

        <!-- This view is shown for the IT Admin by default -->
        <div id="admin-view" class="view">
            <header>
                <img src="https://www.selco-india.com/wp-content/uploads/2022/09/logo.svg" alt="SELCO Logo" class="logo">
                <h1>VCard Management Dashboard</h1>
            </header>
            
            <section id="upload-section">
                <h2>1. Upload Employee Data</h2>
                <p>Upload the `employees.xlsx` file. Columns must be: Name, Designation, Phone Number, Email Id, Address, Photo.</p>
                <input type="file" id="excel-file" accept=".xlsx, .xls">
            </section>
            
            <section id="employee-directory-section">
                <h2>2. Employee Directory</h2>
                <div id="employee-list">
                    <p>Upload a file to see the employee list.</p>
                </div>
            </section>

             <footer>
                <p>SELCO Solar Light Private Limited</p>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
